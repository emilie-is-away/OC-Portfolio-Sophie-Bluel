<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login - Sophie Bluel</title>
  	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/style.css">
  <script src="assets/login.js" defer></script></head>
<body>

<header>
	<h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
	<nav>
		<ul>
			<li><a href="index.html">projets</a></li>
			<li><a href="index.html#contact">contact</a></li>
			<li class="login-link">login</li>
			<li><img class="instagram-icon" src="./assets/icons/instagram.png" alt="Instagram"></li>
		</ul>
	</nav>
</header>

<main>
  <section class="login-section">
    <h2>Log In</h2>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="password">Mot de passe</label>
      <input type="password" id="password" required>
      <p id="error-message" style="color: red; margin-bottom: 10px;"></p>

      <button type="submit">Se connecter</button>
    </form>

    <p class="forgot-password">Mot de passe oublié</p>
  </section>
</main>

</body>
</html>
